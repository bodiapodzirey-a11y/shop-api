$kind: http-request
url: "{{baseUrl}}/orders"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "userId": 972,
      "productId": 2139,
      "quantity": 8006
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "userId": {
          "type": "integer"
        },
        "productId": {
          "type": "integer"
        },
        "quantity": {
          "type": "integer"
        }
      },
      "required": [
        "userId",
        "productId",
        "quantity"
      ]
    }
examples: ./.resources/Create an order.resources/examples
order: 2000
