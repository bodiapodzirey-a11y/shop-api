$kind: http-example
request:
  url: "{{baseUrl}}/orders"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "userId": 972,
        "productId": 2139,
        "quantity": 8006
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 9189,
        "userId": 1782,
        "productId": 6524,
        "quantity": 8608,
        "status": "pending"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer"
          },
          "userId": {
            "type": "integer"
          },
          "productId": {
            "type": "integer"
          },
          "quantity": {
            "type": "integer"
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "completed",
              "cancelled"
            ]
          }
        }
      }
order: 1000
