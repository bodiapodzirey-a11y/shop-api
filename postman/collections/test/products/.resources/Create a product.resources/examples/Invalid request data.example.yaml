$kind: http-example
request:
  url: "{{baseUrl}}/products"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "string",
        "price": 8911.98034418035,
        "stock": 4836,
        "category": "string",
        "description": "string"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "string"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "string"
          }
        }
      }
order: 2000
