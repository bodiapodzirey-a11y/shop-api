$kind: http-request
name: Create a product
url: "{{baseUrl}}/products"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "test",
      "price": 9758.383986562263,
      "stock": 1782,
      "category": "string",
      "description": "string",
      "sku": "string"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "price": {
          "type": "number"
        },
        "stock": {
          "type": "integer"
        },
        "category": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "sku": {
          "type": "string"
        }
      },
      "required": [
        "name",
        "price"
      ]
    }
examples: ./.resources/Create a product.resources/examples
order: 2000
